<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Grid Cards</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: #111;
    color: white;
    padding: 20px;
  }

  .container {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    align-items: center; /* vertical alignment */
  }

  .card {
    background: white;
    color: black;
    border-radius: 6px;
    overflow: hidden;
    box-shadow: 0 2px 5px rgba(0,0,0,0.3);
    text-align: center;
  }

  .card img.main-img {
    width: 100%;
    height: 180px;
    object-fit: cover;
  }

  .info {
    padding: 10px;
  }

  .name {
    font-weight: bold;
    margin-bottom: 5px;
  }

  .friends {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
    font-size: 14px;
    color: gray;
    margin-bottom: 10px;
  }

  .friends img {
    width: 20px;
    height: 20px;
    border-radius: 50%;
  }

  .btn {
    background: #1877f2;
    color: white;
    border: none;
    padding: 8px 12px;
    border-radius: 4px;
    cursor: pointer;
  }
</style>
</head>
<body>

<h2>11d - Grid Cards</h2>

<div class="container">

  
  <div class="card">
    <img src="https://placedog.net/300/200" class="main-img">
    <div class="info">
      <div class="name">Oliver</div>
      <div class="friends">
        <img src="https://placedog.net/50/50">
        2 mutual friends
      </div>
      <button class="btn">Add Friend</button>
    </div>
  </div>

  
  <div class="card">
    <img src="https://placedog.net/300/200" class="main-img">
    <div class="info">
      <div class="name">Mimi</div>
      <div class="friends">
        <img src="https://placedog.net/50/50">
        3 mutual friends
      </div>
      <button class="btn">Add Friend</button>
    </div>
  </div>

  
  <div class="card">
    <img src="https://placedog.net/300/200" class="main-img">
    <div class="info">
      <div class="name">Rex</div>
      <div class="friends">
        <img src="https://placedog.net/50/50">
        4 mutual friends
      </div>
      <button class="btn">Add Friend</button>
    </div>
  </div>

</div>

</body>
</html>
