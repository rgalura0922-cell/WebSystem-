<!DOCTYPE html>
<html>
<head>
    <title>Request for Proposal Form</title>
</head>
<body>

    <h1 style="color: brown;">How can we help?</h1>

    <fieldset>
        <legend style="color: blue; font-weight: bold;">Request for Proposal</legend>
        
        <table border="0" cellpadding="5">
            <tr>
                <td><label>Your name:</label></td>
                <td><input type="text" size="30"></td>
            </tr>
            <tr>
                <td><label>Email:</label></td>
                <td><input type="email" size="30"></td>
            </tr>
            <tr>
                <td><label>Username:</label></td>
                <td><input type="text" size="30"></td>
            </tr>
            <tr>
                <td><label>Password:</label></td>
                <td><input type="password" size="30"></td>
            </tr>
            <tr>
                <td valign="top"><label>Your Business:</label></td>
                <td>
                    <textarea cols="40" rows="10">Briefly describe your business in this space</textarea>
                </td>
            </tr>
            <tr>
                <td valign="top"><label>Company size:</label></td>
                <td>
                    <input type="radio" name="size" value="10"> Less than 10<br>
                    <input type="radio" name="size" value="50"> 11 to 50<br>
                    <input type="radio" name="size" value="200"> 50 to 200<br>
                    <input type="radio" name="size" value="over"> Over 200
                </td>
            </tr>
            <tr>
                <td><label>Service:</label></td>
                <td>
                    <input type="checkbox"> Brand Identity
                    <input type="checkbox"> New Website
                    <input type="checkbox"> Web Redesigner
                </td>
            </tr>
            <tr>
                <td><label>Timeline:</label></td>
                <td>
                    <select>
                        <option>Immediately</option>
                        <option>1-3 Months</option>
                        <option>Long term</option>
                    </select>
                </td>
            </tr>
            <tr>
                <td></td>
                <td>
                    <input type="submit" value="Send to devidesign">
                </td>
            </tr>
        </table>
    </fieldset>

<footer>
	  
	  <p>@Ryzen Galura 2026</p>
	  
	  </footer>
</body>
</html
